<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Earprint</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        font: 13px/1.5 system-ui, -apple-system, sans-serif;
        width: 320px;
        margin: 0;
        padding: 14px 16px 16px;
        background: #0a0a0b;
        color: #e5e5e5;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .brand h3 {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .brand .accent { color: #34d399; }
      .step {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px;
        margin-bottom: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.02);
        transition: background-color 0.15s, border-color 0.15s;
      }
      .step.active {
        border-color: rgba(52, 211, 153, 0.35);
        background: rgba(52, 211, 153, 0.06);
      }
      .step.done {
        opacity: 0.7;
      }
      .badge {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        color: #a3a3a3;
        font-weight: 700;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 1px;
      }
      .step.active .badge {
        background: #34d399;
        color: #06281d;
      }
      .step.done .badge {
        background: rgba(52, 211, 153, 0.25);
        color: #34d399;
      }
      .step .body {
        flex: 1;
        min-width: 0;
      }
      .step .label {
        font-size: 12px;
        font-weight: 600;
        color: #e5e5e5;
        margin-bottom: 2px;
      }
      .step .hint {
        font-size: 11px;
        color: #8a8a8a;
        line-height: 1.45;
      }
      .step.done .label {
        color: #a3a3a3;
      }
      button {
        width: 100%;
        padding: 9px 10px;
        margin-top: 6px;
        border: 1px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12.5px;
        transition: filter 0.12s, opacity 0.12s;
      }
      button:hover:not(:disabled) { filter: brightness(1.12); }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }
      .btn-primary {
        background: #34d399;
        color: #06281d;
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.1);
        color: #e5e5e5;
      }
      #msg {
        margin: 10px 0 0;
        padding: 8px 10px;
        font-size: 11.5px;
        color: #a3a3a3;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 6px;
        min-height: 18px;
        white-space: pre-line;
        display: none;
      }
      #msg.show { display: block; }
      #msg.error { color: #fca5a5; background: rgba(220, 38, 38, 0.08); }
      #msg.success { color: #6ee7b7; background: rgba(5, 150, 105, 0.1); }
      .footer {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: #6a6a6a;
      }
      .footer a {
        color: #8a8a8a;
        text-decoration: none;
      }
      .footer a:hover { color: #e5e5e5; }
    </style>
  </head>
  <body>
    <div class="brand">
      <svg viewBox="0 0 512 512" width="22" height="22" aria-hidden="true">
        <circle cx="256" cy="256" r="248" fill="#0a0a0b" />
        <g
          fill="none"
          stroke="#34d399"
          stroke-width="36"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M214 392 C 172 366 156 306 164 248 C 174 168 230 122 300 132 C 364 141 384 210 366 272 C 357 312 330 344 292 350" />
          <path d="M300 262 C 258 286 220 258 230 214 C 237 184 278 174 306 198" />
        </g>
      </svg>
      <h3>Ear<span class="accent">print</span></h3>
    </div>

    <div id="step-connect" class="step">
      <div class="badge">1</div>
      <div class="body">
        <div class="label" data-i18n="step1Label"></div>
        <div class="hint" data-i18n="step1Hint"></div>
        <button id="connect" class="btn-secondary" data-i18n="step1Button"></button>
      </div>
    </div>

    <div id="step-sync" class="step">
      <div class="badge">2</div>
      <div class="body">
        <div class="label" data-i18n="step2Label"></div>
        <div class="hint" id="sync-hint" data-i18n="step2HintDefault"></div>
        <button id="sync" class="btn-primary" disabled data-i18n="step2Button"></button>
      </div>
    </div>

    <div id="step-view" class="step">
      <div class="badge">3</div>
      <div class="body">
        <div class="label" data-i18n="step3Label"></div>
        <div class="hint" data-i18n="step3Hint"></div>
        <button id="view" class="btn-secondary" data-i18n="step3Button"></button>
      </div>
    </div>

    <p id="msg"></p>

    <div class="footer">
      <a id="guide-link" href="#" target="_blank" data-i18n="footerGuide"></a>
      <span>v<span id="version">0.9.3</span></span>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>

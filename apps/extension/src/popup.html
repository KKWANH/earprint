<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Playlist Analyzer</title>
    <style>
      body {
        font: 13px/1.5 system-ui, sans-serif;
        width: 300px;
        margin: 0;
        padding: 14px;
        background: #0a0a0a;
        color: #e5e5e5;
      }
      h3 { margin: 0 0 10px; font-size: 14px; }
      label { display: block; margin-bottom: 8px; color: #a3a3a3; }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 3px;
        padding: 6px 8px;
        border: 1px solid #333;
        border-radius: 6px;
        background: #1a1a1a;
        color: #e5e5e5;
      }
      button {
        width: 100%;
        padding: 7px;
        margin-top: 6px;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }
      #save { background: #333; color: #e5e5e5; }
      #sync { background: #fff; color: #0a0a0a; }
      hr { border: 0; border-top: 1px solid #262626; margin: 12px 0; }
      #status { margin: 8px 0 0; color: #a3a3a3; min-height: 18px; }
    </style>
  </head>
  <body>
    <h3>Playlist Analyzer</h3>
    <label>
      백엔드 URL
      <input id="url" placeholder="https://playlist-analyzer-web.workers.dev" />
    </label>
    <label>
      동기화 토큰
      <input id="token" placeholder="웹앱 /connect 에서 발급" />
    </label>
    <button id="save">설정 저장</button>
    <hr />
    <button id="sync">좋아요 동기화</button>
    <p id="status"></p>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Earprint</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        font: 13px/1.5 system-ui, -apple-system, sans-serif;
        width: 320px;
        margin: 0;
        padding: 12px 14px 12px;
        background: #0a0a0b;
        color: #e5e5e5;
      }

      /* ── Brand ─────────────────────────────────────────── */
      .brand {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 10px;
      }
      .brand h3 {
        margin: 0;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .brand .accent { color: #34d399; }

      /* ── Step rows ─────────────────────────────────────── */
      /* flex-wrap so the .body child (when shown) breaks to a new line. */
      .step {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        margin-bottom: 4px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
        font-size: 12px;
        transition: background-color 0.15s, border-color 0.15s;
      }
      .step .badge {
        flex-shrink: 0;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        color: #a3a3a3;
        font-size: 10px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .step .label { flex: 1; font-weight: 500; color: #e5e5e5; }
      .step.done .badge { background: rgba(52, 211, 153, 0.25); color: #34d399; }
      .step.done .label { color: #888; }
      /* Hidden by default — only shows under .step.active. */
      .step .body { display: none; flex-basis: 100%; }

      /* Active step: brighter chrome + expanded body. */
      .step.active {
        padding: 9px 11px;
        border-color: rgba(52, 211, 153, 0.4);
        background: rgba(52, 211, 153, 0.06);
      }
      .step.active .badge { background: #34d399; color: #06281d; }
      .step.active .label { font-weight: 600; }
      .step.active .body {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-top: 4px;
      }
      .step.active .hint {
        font-size: 11px;
        line-height: 1.4;
        color: #9a9a9a;
      }

      /* ── Buttons + links ──────────────────────────────── */
      button {
        width: 100%;
        padding: 7px 10px;
        margin-top: 2px;
        border: 1px solid transparent;
        border-radius: 7px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
        transition: filter 0.12s, opacity 0.12s;
      }
      button:hover:not(:disabled) { filter: brightness(1.12); }
      button:disabled { cursor: not-allowed; opacity: 0.4; }
      .btn-primary { background: #34d399; color: #06281d; }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.1);
        color: #e5e5e5;
      }
      .lm-link {
        display: block;
        margin-top: 2px;
        font-size: 10.5px;
        color: #6ee7b7;
        text-decoration: none;
      }
      .lm-link:hover { color: #a7f3d0; text-decoration: underline; }
      .note {
        margin: 4px 0 0;
        font-size: 10px;
        line-height: 1.45;
        color: #707070;
      }

      /* ── Status message ───────────────────────────────── */
      #msg {
        margin: 8px 0 0;
        padding: 6px 9px;
        font-size: 11px;
        line-height: 1.4;
        color: #a3a3a3;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 6px;
        min-height: 16px;
        white-space: pre-line;
        display: none;
      }
      #msg.show { display: block; }
      #msg.error { color: #fca5a5; background: rgba(220, 38, 38, 0.08); }
      #msg.success { color: #6ee7b7; background: rgba(5, 150, 105, 0.1); }

      /* ── Footer ───────────────────────────────────────── */
      .footer {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10.5px;
        color: #6a6a6a;
      }
      .footer a { color: #8a8a8a; text-decoration: none; }
      .footer a:hover { color: #e5e5e5; }
    </style>
  </head>
  <body>
    <div class="brand">
      <svg viewBox="0 0 512 512" width="20" height="20" aria-hidden="true">
        <circle cx="256" cy="256" r="248" fill="#0a0a0b" />
        <g fill="none" stroke="#34d399" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
          <path d="M214 392 C 172 366 156 306 164 248 C 174 168 230 122 300 132 C 364 141 384 210 366 272 C 357 312 330 344 292 350" />
          <path d="M300 262 C 258 286 220 258 230 214 C 237 184 278 174 306 198" />
        </g>
      </svg>
      <h3>Ear<span class="accent">print</span></h3>
    </div>

    <div id="step-connect" class="step">
      <div class="badge">1</div>
      <div class="label" data-i18n="step1Label"></div>
      <div class="body">
        <button id="connect" class="btn-secondary" data-i18n="step1Button"></button>
      </div>
    </div>

    <div id="step-sync" class="step">
      <div class="badge">2</div>
      <div class="label" data-i18n="step2Label"></div>
      <div class="body">
        <div class="hint" id="sync-hint" data-i18n="step2HintDefault"></div>
        <button id="sync" class="btn-primary" disabled data-i18n="step2Button"></button>
        <a id="open-lm" class="lm-link" target="_blank" rel="noopener noreferrer" data-i18n="step2OpenLm"></a>
        <p class="note" data-i18n="step2TipDontTouch"></p>
      </div>
    </div>

    <div id="step-view" class="step">
      <div class="badge">3</div>
      <div class="label" data-i18n="step3Label"></div>
      <div class="body">
        <button id="view" class="btn-secondary" data-i18n="step3Button"></button>
      </div>
    </div>

    <p id="msg"></p>

    <div class="footer">
      <a id="guide-link" href="#" target="_blank" data-i18n="footerGuide"></a>
      <a id="reset-link" href="#">Reset</a>
      <span>v<span id="version">0.9.9</span></span>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
